name: Agent gofmt

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Format changed Go files
        shell: bash
        run: |
          files=$(git diff --name-only origin/main...HEAD -- '*.go')
          if [ -n "$files" ]; then
            gofmt -w $files
          fi
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- '*.go'
          git commit -m 'gofmt RGB11 address implementation'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
