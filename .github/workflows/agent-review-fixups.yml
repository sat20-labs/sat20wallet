name: Agent wallet review fixups

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply mailbox replay and sequence fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sdk/wallet/rgb11_address_delivery.go')
          text = path.read_text()
          old = '''func normalizeRGB11AddressRecordOptions(opts dkvsindexer.RecordOptions) dkvsindexer.RecordOptions {\n\tif opts.Seq == 0 {\n\t\topts.Seq = 1\n\t}\n\tif opts.IssueTime == 0 {\n\t\topts.IssueTime = uint64(time.Now().UnixMilli())\n\t}\n\treturn opts\n}\n'''
          new = '''func nextRGB11AddressRecordOptions(client *SatsNetDKVSClient, keys []string, opts dkvsindexer.RecordOptions) dkvsindexer.RecordOptions {\n\tif opts.IssueTime == 0 {\n\t\topts.IssueTime = uint64(time.Now().UnixMilli())\n\t}\n\tif opts.Seq != 0 {\n\t\treturn opts\n\t}\n\tvar maxSeq uint64\n\tfor _, key := range keys {\n\t\tif key == "" || client == nil {\n\t\t\tcontinue\n\t\t}\n\t\texisting, err := client.GetRecord(key)\n\t\tif err == nil && existing != nil && existing.Seq > maxSeq {\n\t\t\tmaxSeq = existing.Seq\n\t\t}\n\t}\n\topts.Seq = maxSeq + 1\n\treturn opts\n}\n'''
          if old not in text:
              raise SystemExit('missing normalizeRGB11AddressRecordOptions')
          text = text.replace(old, new)

          old = '''\topts := normalizeRGB11AddressRecordOptions(options.RecordOptions)\n\tinlineLimit := options.InlineLimit'''
          new = '''\tinlineLimit := options.InlineLimit'''
          if old not in text:
              raise SystemExit('missing delivery opts block')
          text = text.replace(old, new, 1)

          old = '''\tmode := rgb11AddressEnvelopeInline\n\tobjectID := ""\n\tif len(ciphertext)+2 > inlineLimit {\n\t\tmode = rgb11AddressEnvelopeBlob\n\t\tobjectID = transferID\n\t\tif _, _, err := client.PutAccountBlob(\n\t\t\tp.wallet, objectID, ciphertext, nil, opts, options.Autopay,\n\t\t); err != nil {\n\t\t\treturn nil, err\n\t\t}\n\t}'''
          new = '''\tmode := rgb11AddressEnvelopeInline\n\tobjectID := ""\n\trevisionKeys := []string{pending.State.DeliveryRecordKey}\n\tif len(ciphertext)+2 > inlineLimit {\n\t\tmode = rgb11AddressEnvelopeBlob\n\t\tobjectID = transferID\n\t\tmanifestKey, err := dkvsindexer.BlobManifestKey(pending.State.SenderAccountID, objectID)\n\t\tif err != nil {\n\t\t\treturn nil, err\n\t\t}\n\t\trevisionKeys = append(revisionKeys, manifestKey)\n\t}\n\topts := nextRGB11AddressRecordOptions(client, revisionKeys, options.RecordOptions)\n\tif mode == rgb11AddressEnvelopeBlob {\n\t\tif _, _, err := client.PutAccountBlob(\n\t\t\tp.wallet, objectID, ciphertext, nil, opts, options.Autopay,\n\t\t); err != nil {\n\t\t\treturn nil, err\n\t\t}\n\t}'''
          if old not in text:
              raise SystemExit('missing delivery mode block')
          text = text.replace(old, new, 1)

          old = '''\treceipt, err := p.ValidateRGB11Consignment(ctx, raw)\n\tif err != nil {\n\t\treturn nil, nil, err\n\t}\n\tallocation, status, err := p.findRGB11AddressAllocation(receipt)'''
          new = '''\treceipt, err := p.ValidateRGB11Consignment(ctx, raw)\n\tif err != nil {\n\t\treturn nil, nil, err\n\t}\n\tif receipt.TransferID == "" || receipt.TransferID != transferID {\n\t\treturn nil, nil, ErrRGB11AddressMailbox\n\t}\n\tallocation, status, err := p.findRGB11AddressAllocation(receipt)'''
          if old not in text:
              raise SystemExit('missing transfer ID binding point')
          text = text.replace(old, new, 1)

          old = '''\topts := normalizeRGB11AddressRecordOptions(options.RecordOptions)\n\treturn client.SendAccountMailboxMessage(p.wallet, senderAccountID, transferID, value, opts, options.Autopay)'''
          new = '''\treceiverAccountID, err := dkvsAccountID(p.wallet)\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\tkey, err := dkvsindexer.MailMsgKey(senderAccountID, receiverAccountID, transferID)\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\topts := nextRGB11AddressRecordOptions(client, []string{key}, options.RecordOptions)\n\treturn client.SendAccountMailboxMessage(p.wallet, senderAccountID, transferID, value, opts, options.Autopay)'''
          if old not in text:
              raise SystemExit('missing ACK opts block')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          gofmt -w sdk/wallet/rgb11_address_delivery.go
      - name: Commit fixups
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'bind RGB11 mailbox delivery and advance record revisions'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
