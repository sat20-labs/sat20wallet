name: RGB11 address transfer scheme A

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: rgb11-address-scheme-a
  cancel-in-progress: true

jobs:
  wallet-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout wallet branch
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/sat20wallet
          ref: agent/rgb11-dkvs-transfer-a
          path: sat20wallet
          fetch-depth: 0

      - name: Checkout indexer
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/indexer
          path: indexer

      - name: Checkout RGB11 engine
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/rgb11
          path: rgb11

      - name: Checkout companion SatoshiNet branch
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/satoshinet
          ref: agent/rgb11-dkvs-transfer-a
          path: satoshinet

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sat20wallet/sdk/go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply cohesive RGB11 source layout
        id: apply
        working-directory: sat20wallet
        shell: bash
        run: |
          exec > >(tee /tmp/rgb11-apply.log) 2>&1
          set -euxo pipefail
          if [[ -f sdk/wallet/rgb11/api_types.go && ! -f sdk/wallet/rgb11_send.go ]]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -l .github/refactor/rgb11-overlay.part*
          wc -c .github/refactor/rgb11-overlay.part*
          sha256sum .github/refactor/rgb11-overlay.part*
          cat .github/refactor/rgb11-overlay.part* | tr -d '\r\n[:space:]' | base64 -d | xz -d > /tmp/rgb11-overlay.tar
          sha256sum /tmp/rgb11-overlay.tar
          echo 'fb13a10db750af801fce84057aba99b840aae9b0d2288de308864dd8d1ed13ee  /tmp/rgb11-overlay.tar' | sha256sum -c -
          tar -tf /tmp/rgb11-overlay.tar
          tar -xf /tmp/rgb11-overlay.tar -C .
          while IFS= read -r file; do
            [[ -z "$file" ]] || rm -f "sdk/wallet/$file"
          done < sdk/wallet/.rgb11-delete-list
          rm -f sdk/wallet/.rgb11-delete-list
          mapfile -t gofiles < <(git diff --name-only --diff-filter=ACMR -- '*.go')
          printf 'gofmt files:\n%s\n' "${gofiles[*]}"
          if (( ${#gofiles[@]} )); then
            gofmt -w "${gofiles[@]}"
          fi
          git diff --check
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Upload apply diagnostics
        if: failure() && steps.apply.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rgb11-cohesion-apply-${{ github.run_id }}
          path: |
            /tmp/rgb11-apply.log
            sat20wallet/.github/refactor/rgb11-overlay.part*
          retention-days: 3

      - name: Apply cohesion compile fixups
        working-directory: sat20wallet
        run: |
          python3 .github/scripts/rgb11_cohesion_fixups.py
          gofmt -w sdk/wallet/rgb11/api_types.go sdk/wallet/rgb11_manager.go
          git diff --check

      - name: Check RGB11 cohesion boundaries
        working-directory: sat20wallet
        shell: bash
        run: |
          set -euo pipefail
          root_impl=$(find sdk/wallet -maxdepth 1 -type f -name 'rgb11*.go' ! -name '*_test.go' -printf '%f\n' | sort)
          expected=$'rgb11_api.go\nrgb11_dkvs.go\nrgb11_manager.go'
          if [[ "$root_impl" != "$expected" ]]; then
            printf 'Unexpected root RGB11 implementation files:\n%s\n' "$root_impl"
            exit 1
          fi
          leaked=$(grep -R --line-number -E '^func \(p \*Manager\) .*RGB11' sdk/wallet --include='*.go' --exclude='rgb11_api.go' --exclude='*_test.go' || true)
          if [[ -n "$leaked" ]]; then
            printf 'RGB11 methods leaked outside rgb11_api.go:\n%s\n' "$leaked"
            exit 1
          fi
          test -f sdk/wallet/rgb11/api_types.go
          test -f sdk/wallet/rgb11/address_codec.go
          test -f sdk/wallet/rgb11/backup_codec.go

      - name: Package transformed RGB11 source
        working-directory: sat20wallet
        run: tar -czf /tmp/rgb11-cohesive-source.tgz sdk/wallet sdk/go.mod sdk/go.sum

      - name: Upload transformed RGB11 source
        uses: actions/upload-artifact@v4
        with:
          name: rgb11-cohesive-source-${{ github.run_id }}
          path: /tmp/rgb11-cohesive-source.tgz
          retention-days: 3

      - name: Vet wallet packages excluding legacy copylocks findings
        id: vet
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go vet -copylocks=false ./wallet/... 2>&1 | tee /tmp/rgb11-wallet-vet.log

      - name: Upload vet diagnostics
        if: failure() && steps.vet.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rgb11-cohesion-vet-${{ github.run_id }}
          path: /tmp/rgb11-wallet-vet.log
          retention-days: 3

      - name: Compile wallet root package
        working-directory: sat20wallet/sdk
        run: go test ./wallet -run '^$' -count=1

      - name: Test wallet packages
        working-directory: sat20wallet/sdk
        run: go test ./wallet/... -count=1

      - name: Compile browser WASM
        working-directory: sat20wallet/sdk
        run: GOOS=js GOARCH=wasm go build -buildvcs=false -ldflags='-s -w' -o /tmp/sat20wallet.wasm ./wasm

      - name: Install PWA dependencies
        working-directory: sat20wallet/pwa
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Type-check PWA
        working-directory: sat20wallet/pwa
        run: npm run compile

      - name: Verify RGB11 PWA integration
        working-directory: sat20wallet/pwa
        run: npm run verify:rgb11-l1

      - name: Commit cohesive RGB11 layout
        if: steps.apply.outputs.changed == 'true'
        working-directory: sat20wallet
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sdk/wallet
          git commit -m 'refactor RGB11 wallet code into cohesive manager'
          git fetch origin agent/rgb11-dkvs-transfer-a
          git rebase origin/agent/rgb11-dkvs-transfer-a
          git push origin HEAD:agent/rgb11-dkvs-transfer-a

      - name: Publish commit status
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'rgb11-address-scheme-a',
              description: state === 'success' ? 'Wallet SDK and PWA checks passed' : 'Wallet SDK or PWA checks failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
