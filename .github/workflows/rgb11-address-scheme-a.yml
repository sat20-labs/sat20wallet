name: RGB11 address transfer scheme A

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rgb11-address-scheme-a
  cancel-in-progress: true

jobs:
  patch-rgb11-paid-retention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove the final record-TTL assumption
        shell: bash
        run: |
          if ! grep -q 'client == nil || opts.TTL == 0 || p == nil' sdk/wallet/rgb11_dkvs.go; then
            echo 'Patch already applied.'
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          manager = Path('sdk/wallet/rgb11_dkvs.go')
          text = manager.read_text()
          old = 'if client == nil || opts.TTL == 0 || p == nil || p.wallet == nil {'
          new = 'if client == nil || p == nil || p.wallet == nil {'
          if old not in text:
              raise SystemExit('missing RGB11 backup TTL guard')
          manager.write_text(text.replace(old, new, 1))

          tests = Path('sdk/wallet/rgb11_sync_test.go')
          text = tests.read_text()
          old = '''\t\tFeeAssetName: defaults.AutopayFeeAssetName, Status: "active",
          \t\tDelegates: map[string]dkvsindexer.AutopayDelegateState{
          \t\t\tpayer: {AmountPerBlock: "100", Balance: "10000", Status: "active"},
          \t\t},
          '''
          new = '''\t\tFeeAssetName: defaults.AutopayFeeAssetName, Status: "funding", CurrentBlock: 100,
          \t\tDelegates: map[string]dkvsindexer.AutopayDelegateState{
          \t\t\tpayer: {AmountPerBlock: "100", Balance: "0", LastPayHeight: 100, Status: "funding"},
          \t\t},
          '''
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'expected two paid AUTOPAY fixtures, found {count}')
          tests.write_text(text.replace(old, new))
          PY
          gofmt -w sdk/wallet/rgb11_dkvs.go sdk/wallet/rgb11_sync_test.go
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sdk/wallet/rgb11_dkvs.go sdk/wallet/rgb11_sync_test.go
          git commit -m 'fix: allow zero-TTL RGB11 paid backups'
          git push origin HEAD:${{ github.head_ref }}
