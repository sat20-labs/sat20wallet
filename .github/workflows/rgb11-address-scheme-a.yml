name: RGB11 address transfer scheme A

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rgb11-address-scheme-a
  cancel-in-progress: true

jobs:
  patch-account-autopay:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply account readiness integration
        shell: bash
        run: |
          if grep -q 'waitForAccountAutopayReady(defaults, amountPerBlock)' sdk/wallet/account_pwa.go; then
            echo 'Patch already applied.'
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sdk/wallet/account_pwa.go')
          text = path.read_text()

          old = '\taccountRequiredRecords          = uint64(4)'
          new = '\taccountRequiredRecords          = uint64(5)'
          if old not in text:
              raise SystemExit('missing account record-slot constant')
          text = text.replace(old, new, 1)

          old = '''\tif err != nil {
          \t\treturn nil, err
          \t}
          \treturn &AccountStorageAuthorization{
          \t\tID: AccountStoragePaid, Mode: AccountStoragePaid,
          '''
          new = '''\tif err != nil {
          \t\treturn nil, err
          \t}
          \tif err := p.waitForAccountAutopayReady(defaults, amountPerBlock); err != nil {
          \t\treturn nil, err
          \t}
          \treturn &AccountStorageAuthorization{
          \t\tID: AccountStoragePaid, Mode: AccountStoragePaid,
          '''
          if old not in text:
              raise SystemExit('missing account AUTOPAY result block')
          text = text.replace(old, new, 1)

          old = 'Description: "AUTOPAY 交易已广播；完成首次区块支付后即可保存。",'
          new = 'Description: "AUTOPAY 首次区块支付已确认。",'
          if old not in text:
              raise SystemExit('missing account AUTOPAY summary text')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          gofmt -w sdk/wallet/account_pwa.go sdk/wallet/account_autopay_ready.go sdk/wallet/account_autopay_ready_test.go
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sdk/wallet/account_pwa.go sdk/wallet/account_autopay_ready.go sdk/wallet/account_autopay_ready_test.go
          git commit -m 'fix: wait for first account AUTOPAY payment'
          git push origin HEAD:${{ github.head_ref }}
