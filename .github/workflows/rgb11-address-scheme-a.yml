name: RGB11 address transfer scheme A

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-rgb11-snapshot-retention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply latest-snapshot retention
        shell: bash
        run: |
          if grep -q 'pruneRGB11WalletSnapshots(p.wallet, walletID, operationID)' sdk/wallet/rgb11_dkvs.go; then
            echo 'Patch already applied.'
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          manager = Path('sdk/wallet/rgb11_dkvs.go')
          text = manager.read_text()
          old = '''\tif autopay == nil {
          \t\tmanifest, _, err = p.PutBlob(wallet, hex.EncodeToString(operationID[:]), value, nil, opts)
          \t} else {
          \t\tmanifest, _, err = p.PutBlobWithAutopay(wallet, hex.EncodeToString(operationID[:]), value, nil, opts, *autopay)
          \t}
          '''
          new = '''\tmetadata := rgb11WalletSnapshotMetadata(walletID)
          \tif autopay == nil {
          \t\tmanifest, _, err = p.PutBlob(wallet, hex.EncodeToString(operationID[:]), value, metadata, opts)
          \t} else {
          \t\tmanifest, _, err = p.PutBlobWithAutopay(wallet, hex.EncodeToString(operationID[:]), value, metadata, opts, *autopay)
          \t}
          '''
          if old not in text:
              raise SystemExit('missing snapshot blob write block')
          text = text.replace(old, new, 1)

          old = '''\tp.rgbManager.dkvsStatus = "synced"
          \tp.rgbManager.head = head
          \treturn head, record, nil
          '''
          new = '''\tp.rgbManager.head = head
          \tif err := client.pruneRGB11WalletSnapshots(p.wallet, walletID, operationID); err != nil {
          \t\tp.rgbManager.dkvsStatus = "warning"
          \t} else {
          \t\tp.rgbManager.dkvsStatus = "synced"
          \t}
          \treturn head, record, nil
          '''
          if old not in text:
              raise SystemExit('missing snapshot completion block')
          manager.write_text(text.replace(old, new, 1))

          mock = Path('sdk/wallet/rgb11_sync_test.go')
          text = mock.read_text()
          old = '''\tif !strings.HasSuffix(url.Path, "/v3/dkvs/records") {
          \t\treturn nil, fmt.Errorf("unexpected RGB11 DKVS POST path %s", url.Path)
          \t}
          '''
          new = '''\trecordPath := strings.HasSuffix(url.Path, "/v3/dkvs/records")
          \ttombstonePath := strings.HasSuffix(url.Path, "/v3/dkvs/tombstone")
          \tif !recordPath && !tombstonePath {
          \t\treturn nil, fmt.Errorf("unexpected RGB11 DKVS POST path %s", url.Path)
          \t}
          '''
          if old not in text:
              raise SystemExit('missing memory POST path guard')
          text = text.replace(old, new, 1)
          old = '''\tif current := h.records[record.Key]; current != nil && record.Seq <= current.Seq {
          \t\t// The production endpoint returns the submitted record even when the
          \t\t// selector keeps the existing active record. The client must re-read the
          \t\t// key before treating its candidate as the latest wallet head.
          \t\treturn rgb11DKVSResponse(0, "ok", &record, 0)
          \t}
          \th.records[record.Key] = cloneRGB11DKVSRecord(&record)
          '''
          new = '''\tif current := h.records[record.Key]; current != nil && record.Seq <= current.Seq {
          \t\t// The production endpoint returns the submitted record even when the
          \t\t// selector keeps the existing active record. The client must re-read the
          \t\t// key before treating its candidate as the latest wallet head.
          \t\treturn rgb11DKVSResponse(0, "ok", &record, 0)
          \t}
          \tif tombstonePath {
          \t\tdelete(h.records, record.Key)
          \t\treturn rgb11DKVSResponse(0, "ok", &record, 0)
          \t}
          \th.records[record.Key] = cloneRGB11DKVSRecord(&record)
          '''
          if old not in text:
              raise SystemExit('missing memory record selector block')
          mock.write_text(text.replace(old, new, 1))
          PY
          gofmt -w sdk/wallet/rgb11_dkvs.go sdk/wallet/rgb11_sync_test.go sdk/wallet/rgb11_snapshot_gc.go sdk/wallet/rgb11_snapshot_gc_test.go
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sdk/wallet/rgb11_dkvs.go sdk/wallet/rgb11_sync_test.go sdk/wallet/rgb11_snapshot_gc.go sdk/wallet/rgb11_snapshot_gc_test.go
          git commit -m 'fix: retain only the latest RGB11 wallet snapshot'
          git push origin HEAD:${{ github.head_ref }}
