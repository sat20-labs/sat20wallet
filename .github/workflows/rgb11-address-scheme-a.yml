name: RGB11 address transfer scheme A

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  wallet-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout wallet branch
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/sat20wallet
          ref: agent/rgb11-dkvs-transfer-a
          path: sat20wallet
          fetch-depth: 0

      - name: Checkout indexer
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/indexer
          path: indexer

      - name: Checkout RGB11 engine
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/rgb11
          path: rgb11

      - name: Checkout companion SatoshiNet branch
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/satoshinet
          ref: agent/rgb11-dkvs-transfer-a
          path: satoshinet

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sat20wallet/sdk/go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply final review fixes
        working-directory: sat20wallet
        run: python3 .github/scripts/rgb11_review_fixups.py

      - name: Format changed Go files
        working-directory: sat20wallet
        run: gofmt -w sdk/wallet/rgb11_address_api.go

      - name: Vet RGB11 subpackage
        working-directory: sat20wallet/sdk
        run: go vet ./wallet/rgb11

      - name: Compile wallet root package
        working-directory: sat20wallet/sdk
        run: go test ./wallet -run '^$' -count=1

      - name: Test wallet packages
        working-directory: sat20wallet/sdk
        run: go test ./wallet/... -count=1

      - name: Compile browser WASM
        working-directory: sat20wallet/sdk
        run: GOOS=js GOARCH=wasm go build -ldflags='-s -w' -o ../pwa/public/wasm/sat20wallet.wasm ./wasm

      - name: Install PWA dependencies
        working-directory: sat20wallet/pwa
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Type-check PWA
        working-directory: sat20wallet/pwa
        run: npm run compile

      - name: Verify RGB11 PWA integration
        working-directory: sat20wallet/pwa
        run: npm run verify:rgb11-l1

      - name: Package reviewed files
        working-directory: sat20wallet
        run: |
          tar -czf /tmp/rgb11-reviewed-files.tgz \
            sdk/wallet/rgb11_address_api.go \
            pwa/components/wallet/RGB11SendDialog.vue \
            pwa/composables/hooks/useRgb11Assets.ts \
            pwa/composables/hooks/useUnifiedAssets.ts \
            pwa/locales/en.json \
            pwa/locales/zh.json \
            pwa/scripts/verify/rgb11-l1-smoke.mjs \
            pwa/public/wasm/sat20wallet.wasm

      - name: Upload reviewed files
        uses: actions/upload-artifact@v4
        with:
          name: rgb11-reviewed-files-${{ github.run_id }}
          path: /tmp/rgb11-reviewed-files.tgz
          retention-days: 3

      - name: Commit reviewed integration
        working-directory: sat20wallet
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            sdk/wallet/rgb11_address_api.go \
            pwa/components/wallet/RGB11SendDialog.vue \
            pwa/composables/hooks/useRgb11Assets.ts \
            pwa/composables/hooks/useUnifiedAssets.ts \
            pwa/locales/en.json \
            pwa/locales/zh.json \
            pwa/scripts/verify/rgb11-l1-smoke.mjs \
            pwa/public/wasm/sat20wallet.wasm
          git commit -m 'finish RGB11 address-mode PWA integration'
          git fetch origin agent/rgb11-dkvs-transfer-a
          git rebase origin/agent/rgb11-dkvs-transfer-a
          git push origin HEAD:agent/rgb11-dkvs-transfer-a

      - name: Publish commit status
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'rgb11-address-scheme-a',
              description: state === 'success' ? 'Wallet SDK and PWA checks passed' : 'Wallet SDK or PWA checks failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
