name: Agent test compile fix

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix snapshot test decoding
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('sdk/wallet/rgb11_address_transfer_test.go')
          text = p.read_text()
          text = text.replace('"encoding/hex"', '"encoding/gob"\n\t"encoding/hex"')
          text = text.replace('if err := decode(record.Value, &pending); err != nil {', 'if err := gob.NewDecoder(bytes.NewReader(record.Value)).Decode(&pending); err != nil {')
          p.write_text(text)
          PY
          gofmt -w sdk/wallet/rgb11_address_transfer_test.go
      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix RGB11 address snapshot test decoding'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
