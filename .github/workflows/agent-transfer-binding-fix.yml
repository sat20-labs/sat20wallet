name: Agent transfer binding fix

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject mailbox replay before persistence
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('sdk/wallet/rgb11_address_delivery.go')
          text = p.read_text()
          old = 'indexer "github.com/sat20-labs/indexer/common"\n\trgb11wallet'
          new = 'indexer "github.com/sat20-labs/indexer/common"\n\tcoreconsignment "github.com/sat20-labs/rgb11/consignment"\n\trgb11wallet'
          if old not in text:
              raise SystemExit('missing import insertion point')
          text = text.replace(old, new, 1)
          old = '''\traw, mode, err := p.readRGB11AddressConsignment(client, record, senderID, transferID, verify)\n\tif err != nil {\n\t\treturn nil, nil, err\n\t}\n\treceipt, err := p.ValidateRGB11Consignment(ctx, raw)'''
          new = '''\traw, mode, err := p.readRGB11AddressConsignment(client, record, senderID, transferID, verify)\n\tif err != nil {\n\t\treturn nil, nil, err\n\t}\n\tcontainer, err := coreconsignment.Decode(raw)\n\tif err != nil || container.Armor.ID == "" || container.Armor.ID != transferID {\n\t\treturn nil, nil, ErrRGB11AddressMailbox\n\t}\n\treceipt, err := p.ValidateRGB11Consignment(ctx, raw)'''
          if old not in text:
              raise SystemExit('missing mailbox decode point')
          p.write_text(text.replace(old, new, 1))
          PY
          gofmt -w sdk/wallet/rgb11_address_delivery.go
      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'reject RGB11 mailbox transfer replays before persistence'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
