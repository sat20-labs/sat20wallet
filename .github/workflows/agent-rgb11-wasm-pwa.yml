name: Agent RGB11 address WASM and PWA

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out wallet
        uses: actions/checkout@v4
        with:
          path: workspace/sat20wallet
          fetch-depth: 0

      - name: Check out indexer
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/indexer
          path: workspace/indexer

      - name: Check out RGB11 engine
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/rgb11
          path: workspace/rgb11

      - name: Check out SatoshiNet branch
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/satoshinet
          ref: agent/rgb11-dkvs-transfer-a
          path: workspace/satoshinet

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: workspace/sat20wallet/sdk/go.mod
          cache: false

      - name: Add WASM and TypeScript APIs
        working-directory: workspace/sat20wallet
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          wasm = Path('sdk/wasm/main.go')
          text = wasm.read_text()
          marker = '\nfunc main() {'
          code = r'''

type rgb11AddressReceiveWASMRequest struct {
	TTL          uint64 `json:"ttl,omitempty"`
	ExpiryHeight uint64 `json:"expiry_height,omitempty"`
	Autopay      bool   `json:"autopay,omitempty"`
	Flags        uint8  `json:"flags,omitempty"`
}

type rgb11AddressSendWASMRequest struct {
	ReceiverAddress  string `json:"receiver_address"`
	AssetName        string `json:"asset_name"`
	AmountRaw        string `json:"amount_raw"`
	FeeRate          int64  `json:"fee_rate"`
	MinConfirmations uint8  `json:"min_confirmations"`
	Expiry           int64  `json:"expiry,omitempty"`
}

type rgb11AddressDeliveryWASMRequest struct {
	TransferID   string `json:"transfer_id"`
	TTL          uint64 `json:"ttl,omitempty"`
	ExpiryHeight uint64 `json:"expiry_height,omitempty"`
	Autopay      bool   `json:"autopay,omitempty"`
	InlineLimit  int    `json:"inline_limit,omitempty"`
}

type rgb11AddressMailboxWASMRequest struct {
	Height       uint64 `json:"height,omitempty"`
	Now          uint64 `json:"now,omitempty"`
	TTL          uint64 `json:"ttl,omitempty"`
	ExpiryHeight uint64 `json:"expiry_height,omitempty"`
	Autopay      bool   `json:"autopay,omitempty"`
}

func rgb11AddressAutopay(enabled bool) *wallet.DKVSAutopayOptions {
	if !enabled {
		return nil
	}
	return &wallet.DKVSAutopayOptions{AddressParams: wallet.GetChainParam_SatsNet()}
}

func enableRGB11AddressReceive(this js.Value, p []js.Value) any {
	if _mgr == nil {
		return createJsRet(nil, -1, "Manager not initialized")
	}
	var request rgb11AddressReceiveWASMRequest
	if len(p) > 0 && p[0].Type() == js.TypeString && strings.TrimSpace(p[0].String()) != "" {
		if err := json.Unmarshal([]byte(p[0].String()), &request); err != nil {
			return createJsRet(nil, -1, err.Error())
		}
	}
	jsHandler := createAsyncJsHandler(func() (interface{}, int, string) {
		endpoint, err := _mgr.EnableConfiguredRGB11AddressReceive(wallet.RGB11ReceiveCapabilityOptions{
			RecordOptions: dkvsindexer.RecordOptions{TTL: request.TTL, ExpiryHeight: request.ExpiryHeight},
			Autopay:       rgb11AddressAutopay(request.Autopay),
			Flags:         request.Flags,
		})
		if err != nil {
			return nil, -1, err.Error()
		}
		encoded, err := json.Marshal(endpoint)
		if err != nil {
			return nil, -1, err.Error()
		}
		return map[string]any{
			"endpoint":  string(encoded),
			"temporary": endpoint.Temporary,
		}, 0, "ok"
	})
	return js.Global().Get("Promise").New(jsHandler)
}

func resolveRGB11AddressEndpoint(this js.Value, p []js.Value) any {
	if _mgr == nil || len(p) < 1 || p[0].Type() != js.TypeString {
		return createJsRet(nil, -1, "missing RGB11 receiver address")
	}
	address := strings.TrimSpace(p[0].String())
	jsHandler := createAsyncJsHandler(func() (interface{}, int, string) {
		endpoint, err := _mgr.ResolveConfiguredRGB11AddressEndpoint(address,
			dkvsindexer.RecordVerificationOptions{Now: uint64(time.Now().UnixMilli())})
		if err != nil {
			return nil, -1, err.Error()
		}
		encoded, err := json.Marshal(endpoint)
		if err != nil {
			return nil, -1, err.Error()
		}
		return map[string]any{"endpoint": string(encoded)}, 0, "ok"
	})
	return js.Global().Get("Promise").New(jsHandler)
}

func prepareRGB11AddressTransfer(this js.Value, p []js.Value) any {
	if _mgr == nil || len(p) < 1 || p[0].Type() != js.TypeString {
		return createJsRet(nil, -1, "missing RGB11 address transfer request")
	}
	var request rgb11AddressSendWASMRequest
	if err := json.Unmarshal([]byte(p[0].String()), &request); err != nil {
		return createJsRet(nil, -1, err.Error())
	}
	assetName := indexer.NewAssetNameFromString(strings.TrimSpace(request.AssetName))
	if !strings.EqualFold(assetName.Protocol, "rgb11") {
		return createJsRet(nil, -1, "asset_name must use the rgb11 protocol")
	}
	jsHandler := createAsyncJsHandler(func() (interface{}, int, string) {
		prepared, endpoint, err := _mgr.PrepareConfiguredRGB11AddressTransfer(context.Background(),
			wallet.RGB11AddressSendRequest{
				ReceiverAddress:  request.ReceiverAddress,
				AssetName:        assetName,
				AmountRaw:        request.AmountRaw,
				FeeRate:          request.FeeRate,
				MinConfirmations: request.MinConfirmations,
				Expiry:           request.Expiry,
			}, dkvsindexer.RecordVerificationOptions{Now: uint64(time.Now().UnixMilli())})
		if err != nil {
			return nil, -1, err.Error()
		}
		encodedTransfer, err := json.Marshal(prepared)
		if err != nil {
			return nil, -1, err.Error()
		}
		encodedEndpoint, err := json.Marshal(endpoint)
		if err != nil {
			return nil, -1, err.Error()
		}
		return map[string]any{
			"transfer": string(encodedTransfer),
			"endpoint": string(encodedEndpoint),
		}, 0, "ok"
	})
	return js.Global().Get("Promise").New(jsHandler)
}

func deliverAndBroadcastRGB11AddressTransfer(this js.Value, p []js.Value) any {
	if _mgr == nil || len(p) < 1 || p[0].Type() != js.TypeString {
		return createJsRet(nil, -1, "missing RGB11 delivery request")
	}
	var request rgb11AddressDeliveryWASMRequest
	if err := json.Unmarshal([]byte(p[0].String()), &request); err != nil {
		return createJsRet(nil, -1, err.Error())
	}
	jsHandler := createAsyncJsHandler(func() (interface{}, int, string) {
		result, err := _mgr.DeliverAndBroadcastConfiguredRGB11AddressTransfer(request.TransferID,
			wallet.RGB11AddressDeliveryOptions{
				RecordOptions: dkvsindexer.RecordOptions{TTL: request.TTL, ExpiryHeight: request.ExpiryHeight},
				Autopay:       rgb11AddressAutopay(request.Autopay),
				InlineLimit:   request.InlineLimit,
			})
		if err != nil {
			return nil, -1, err.Error()
		}
		encoded, err := json.Marshal(result)
		if err != nil {
			return nil, -1, err.Error()
		}
		return map[string]any{
			"result":    string(encoded),
			"txid":      result.TxID,
			"temporary": result.Temporary,
		}, 0, "ok"
	})
	return js.Global().Get("Promise").New(jsHandler)
}

func syncRGB11AddressMailbox(this js.Value, p []js.Value) any {
	if _mgr == nil {
		return createJsRet(nil, -1, "Manager not initialized")
	}
	var request rgb11AddressMailboxWASMRequest
	if len(p) > 0 && p[0].Type() == js.TypeString && strings.TrimSpace(p[0].String()) != "" {
		if err := json.Unmarshal([]byte(p[0].String()), &request); err != nil {
			return createJsRet(nil, -1, err.Error())
		}
	}
	if request.Now == 0 {
		request.Now = uint64(time.Now().UnixMilli())
	}
	jsHandler := createAsyncJsHandler(func() (interface{}, int, string) {
		result, err := _mgr.SyncConfiguredRGB11AddressMailbox(context.Background(),
			dkvsindexer.RecordVerificationOptions{Height: request.Height, Now: request.Now},
			wallet.RGB11AddressDeliveryOptions{
				RecordOptions: dkvsindexer.RecordOptions{TTL: request.TTL, ExpiryHeight: request.ExpiryHeight},
				Autopay:       rgb11AddressAutopay(request.Autopay),
			})
		if err != nil {
			return nil, -1, err.Error()
		}
		encoded, err := json.Marshal(result)
		if err != nil {
			return nil, -1, err.Error()
		}
		return map[string]any{"result": string(encoded)}, 0, "ok"
	})
	return js.Global().Get("Promise").New(jsHandler)
}

func getRGB11AddressCarrierWarning(this js.Value, p []js.Value) any {
	return createJsRet(map[string]any{"warning": wallet.RGB11AddressCarrierWarning}, 0, "ok")
}
'''
          if 'func prepareRGB11AddressTransfer(' not in text:
              if marker not in text:
                  raise SystemExit('missing main marker')
              text = text.replace(marker, code + marker, 1)

          registration = '''\tobj.Set("prepareRGB11Transfer", js.FuncOf(prepareRGB11Transfer))\n'''
          addition = registration + '''\tobj.Set("enableRGB11AddressReceive", js.FuncOf(enableRGB11AddressReceive))
\tobj.Set("resolveRGB11AddressEndpoint", js.FuncOf(resolveRGB11AddressEndpoint))
\tobj.Set("prepareRGB11AddressTransfer", js.FuncOf(prepareRGB11AddressTransfer))
\tobj.Set("deliverAndBroadcastRGB11AddressTransfer", js.FuncOf(deliverAndBroadcastRGB11AddressTransfer))
\tobj.Set("syncRGB11AddressMailbox", js.FuncOf(syncRGB11AddressMailbox))
\tobj.Set("getRGB11AddressCarrierWarning", js.FuncOf(getRGB11AddressCarrierWarning))
'''
          if 'obj.Set("prepareRGB11AddressTransfer"' not in text:
              if registration not in text:
                  raise SystemExit('missing RGB11 registration marker')
              text = text.replace(registration, addition, 1)
          wasm.write_text(text)

          ts = Path('pwa/utils/sat20.ts')
          text = ts.read_text()
          marker = '''  async buildRGB11RelayRecord(transferId: string): Promise<
'''
          code = r'''  async enableRGB11AddressReceive(request: {
    ttl?: number
    expiry_height?: number
    autopay?: boolean
    flags?: number
  } = {}): Promise<[Error | undefined, { endpoint: string; temporary: boolean } | undefined]> {
    return this._handleRequest('enableRGB11AddressReceive', JSON.stringify(request))
  }

  async resolveRGB11AddressEndpoint(address: string): Promise<
    [Error | undefined, { endpoint: string } | undefined]
  > {
    return this._handleRequest('resolveRGB11AddressEndpoint', address)
  }

  async prepareRGB11AddressTransfer(request: {
    receiver_address: string
    asset_name: string
    amount_raw: string
    fee_rate?: number
    min_confirmations?: number
    expiry?: number
  }): Promise<[Error | undefined, { transfer: string; endpoint: string } | undefined]> {
    return this._handleRequest('prepareRGB11AddressTransfer', JSON.stringify(request))
  }

  async deliverAndBroadcastRGB11AddressTransfer(request: {
    transfer_id: string
    ttl?: number
    expiry_height?: number
    autopay?: boolean
    inline_limit?: number
  }): Promise<
    [Error | undefined, { result: string; txid: string; temporary: boolean } | undefined]
  > {
    return this._handleRequest('deliverAndBroadcastRGB11AddressTransfer', JSON.stringify(request))
  }

  async syncRGB11AddressMailbox(request: {
    height?: number
    now?: number
    ttl?: number
    expiry_height?: number
    autopay?: boolean
  } = {}): Promise<[Error | undefined, { result: string } | undefined]> {
    return this._handleRequest('syncRGB11AddressMailbox', JSON.stringify(request))
  }

  async getRGB11AddressCarrierWarning(): Promise<
    [Error | undefined, { warning: string } | undefined]
  > {
    return this._handleRequest('getRGB11AddressCarrierWarning')
  }

'''
          if 'async prepareRGB11AddressTransfer(' not in text:
              if marker not in text:
                  raise SystemExit('missing sat20 RGB11 insertion marker')
              text = text.replace(marker, code + marker, 1)
          ts.write_text(text)

          translations = {
              'zh.json': {
                  'addressMode': 'SAT20 地址',
                  'invoiceMode': '传统 Invoice',
                  'receiverAddress': '接收方 SAT20 P2TR 地址',
                  'receiverAddressPlaceholder': '输入接收方 Bitcoin P2TR 地址',
                  'amountRaw': '原始资产数量',
                  'addressModeHint': '钱包会读取接收方 DKVS capability，自行生成 Witness Seal，先投递 Consignment，再直接广播 Bitcoin 交易。',
                  'sendByAddress': '投递并广播',
                  'addressUnavailable': '该地址没有启用 RGB11 DKVS 收款，请改用接收方提供的传统 RGB invoice。',
                  'addressBroadcasted': 'Consignment 已投递，Bitcoin 交易已广播：{txid}',
                  'temporaryTtlWarning': '当前使用临时 DKVS TTL。接收方长期离线时数据可能过期；发送方钱包会在收到 ACK 且交易确认前保留完整 Consignment。',
                  'carrierWarning': '该地址包含 RGB11 资产。使用不支持 RGB 的钱包花费其 UTXO，可能导致 RGB11 资产永久丢失。',
              },
              'en.json': {
                  'addressMode': 'SAT20 address',
                  'invoiceMode': 'Traditional invoice',
                  'receiverAddress': 'Receiver SAT20 P2TR address',
                  'receiverAddressPlaceholder': 'Enter the receiver Bitcoin P2TR address',
                  'amountRaw': 'Raw asset amount',
                  'addressModeHint': 'The wallet resolves the receiver DKVS capability, creates the Witness Seal, delivers the Consignment, and then broadcasts the Bitcoin transaction without waiting for an ACK.',
                  'sendByAddress': 'Deliver and broadcast',
                  'addressUnavailable': 'This address has not enabled RGB11 DKVS receiving. Use a traditional RGB invoice supplied by the receiver.',
                  'addressBroadcasted': 'Consignment delivered and Bitcoin transaction broadcast: {txid}',
                  'temporaryTtlWarning': 'This transfer is using a temporary DKVS TTL. Data may expire while the receiver is offline; the sender retains the full Consignment until ACK and Bitcoin confirmation.',
                  'carrierWarning': 'This address contains RGB11 assets. Spending its UTXO with a wallet that is not RGB-aware may permanently destroy the RGB11 assets.',
              },
          }
          for name, values in translations.items():
              path = Path('pwa/locales') / name
              data = json.loads(path.read_text())
              data.setdefault('rgb11Transfer', {}).update(values)
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          smoke = Path('pwa/scripts/verify/rgb11-l1-smoke.mjs')
          text = smoke.read_text()
          marker = "  'prepareRGB11Transfer',\n"
          addition = marker + "  'enableRGB11AddressReceive',\n  'resolveRGB11AddressEndpoint',\n  'prepareRGB11AddressTransfer',\n  'deliverAndBroadcastRGB11AddressTransfer',\n  'syncRGB11AddressMailbox',\n  'getRGB11AddressCarrierWarning',\n"
          if "  'prepareRGB11AddressTransfer'," not in text:
              if marker not in text:
                  raise SystemExit('missing smoke method marker')
              text = text.replace(marker, addition, 1)
          old = '''await requireContains('components/wallet/RGB11SendDialog.vue', [
  'prepareRGB11Transfer','''
          new = '''await requireContains('components/wallet/RGB11SendDialog.vue', [
  'prepareRGB11AddressTransfer',
  'deliverAndBroadcastRGB11AddressTransfer',
  'temporaryTtlWarning',
  'prepareRGB11Transfer','''
          if old in text:
              text = text.replace(old, new, 1)
          old = '''await requireContains('composables/hooks/useRgb11Assets.ts', [
  'tickerInfoFor','''
          new = '''await requireContains('composables/hooks/useRgb11Assets.ts', [
  'syncRGB11AddressMailbox',
  'tickerInfoFor','''
          if old in text:
              text = text.replace(old, new, 1)
          smoke.write_text(text)
          PY
          gofmt -w sdk/wasm/main.go

      - name: Build browser WASM
        working-directory: workspace/sat20wallet/sdk
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -o ../pwa/public/wasm/sat20wallet.wasm ./wasm

      - name: Remove migration workflow
        working-directory: workspace/sat20wallet
        run: rm .github/workflows/agent-rgb11-wasm-pwa.yml

      - name: Commit browser integration
        working-directory: workspace/sat20wallet
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'expose RGB11 address transfers to PWA'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
