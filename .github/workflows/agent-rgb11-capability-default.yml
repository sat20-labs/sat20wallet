name: Agent RGB11 capability default

on:
  push:
    branches: [agent/rgb11-dkvs-transfer-a]

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize mailbox errors and publish receive capability
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('sdk/wallet/rgb11_address_delivery.go')
          text = p.read_text()
          old = '''\t\t_, encrypted, err = client.GetAccountBlob(senderID, messageID, dkvsindexer.DefaultBlobPolicy(), verify)
          \t\tif err != nil {
          \t\t\treturn nil, "", err
          \t\t}'''
          new = '''\t\t_, encrypted, err = client.GetAccountBlob(senderID, messageID, dkvsindexer.DefaultBlobPolicy(), verify)
          \t\tif err != nil {
          \t\t\treturn nil, "", fmt.Errorf("%w: %v", ErrRGB11AddressMailbox, err)
          \t\t}'''
          if old not in text:
              raise SystemExit('missing blob read error block')
          p.write_text(text.replace(old, new, 1))

          p = Path('sdk/wallet/rgb11_backup.go')
          text = p.read_text()
          marker = '''func (p *Manager) SyncRGB11WalletState(walletID string, opts dkvsindexer.RecordOptions) (*coresync.WalletHead, error) {
          \treturn p.syncRGB11WalletState(walletID, opts, true)
          }
          '''
          helper = marker + '''
          func (p *Manager) ensureRGB11AddressReceiveForDKVS(client *SatsNetDKVSClient,
          \topts dkvsindexer.RecordOptions) error {
          \tif p == nil || client == nil || p.wallet == nil {
          \t\treturn ErrRGB11Inconsistent
          \t}
          \tautopay := &DKVSAutopayOptions{AddressParams: GetChainParam_SatsNet()}
          \t_, err := p.EnableRGB11AddressReceive(client, RGB11ReceiveCapabilityOptions{
          \t\tRecordOptions: opts,
          \t\tAutopay:       autopay,
          \t})
          \treturn err
          }
          '''
          if 'func (p *Manager) ensureRGB11AddressReceiveForDKVS' not in text:
              if marker not in text:
                  raise SystemExit('missing sync entry marker')
              text = text.replace(marker, helper, 1)

          old = '''\thead, _, err := p.BackupRGB11WalletState(client, walletID, p.rgbManager.head, opts)
          \tif err != nil {
          \t\treturn nil, err
          \t}
          \tif enableAuto {'''
          new = '''\thead, _, err := p.BackupRGB11WalletState(client, walletID, p.rgbManager.head, opts)
          \tif err != nil {
          \t\treturn nil, err
          \t}
          \tif err := p.ensureRGB11AddressReceiveForDKVS(client, opts); err != nil {
          \t\tp.rgbManager.dkvsStatus = "warning"
          \t\treturn nil, err
          \t}
          \tif enableAuto {'''
          if old not in text:
              raise SystemExit('missing backup completion block')
          text = text.replace(old, new, 1)

          old = '''\thead, err := p.RestoreRGB11WalletState(client, walletID, verifyOpts)
          \tif err != nil {
          \t\treturn nil, err
          \t}
          \tif err := p.enableRGB11AutoBackup(dkvsindexer.RecordOptions{TTL: record.TTL, ExpiryHeight: record.ExpiryHeight}); err != nil {'''
          new = '''\thead, err := p.RestoreRGB11WalletState(client, walletID, verifyOpts)
          \tif err != nil {
          \t\treturn nil, err
          \t}
          \tretention := dkvsindexer.RecordOptions{TTL: record.TTL, ExpiryHeight: record.ExpiryHeight}
          \tif err := p.ensureRGB11AddressReceiveForDKVS(client, retention); err != nil {
          \t\tp.rgbManager.dkvsStatus = "warning"
          \t\treturn nil, err
          \t}
          \tif err := p.enableRGB11AutoBackup(retention); err != nil {'''
          if old not in text:
              raise SystemExit('missing restore completion block')
          p.write_text(text.replace(old, new, 1))
          PY
          gofmt -w sdk/wallet/rgb11_address_delivery.go sdk/wallet/rgb11_backup.go
          rm .github/workflows/agent-rgb11-capability-default.yml
      - name: Commit migration
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'publish RGB11 receive capability with DKVS backup'
          git push origin HEAD:agent/rgb11-dkvs-transfer-a
