name: Account management

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'sdk/account/**'
      - 'sdk/wallet/account_*.go'
      - 'sdk/wallet/dkvs_config*.go'
      - 'sdk/wallet/dkvs_free_local*.go'
      - 'sdk/wallet/dkvs_signing.go'
      - 'sdk/wallet/dkvs_paid_retention_test.go'
      - 'sdk/wallet/rgb11_dkvs.go'
      - 'sdk/wallet/rgb11/backup_codec.go'
      - 'sdk/wallet/rgb11/paid_retention_policy_test.go'
      - 'sdk/wasm/account_management.go'
      - 'sdk/e2e/account_management_dkvs_e2e_test.go'
      - 'sdk/e2e/dkvs_noplugin_harness_test.go'
      - 'sdk/e2e/dkvs_template_invoke_test.go'
      - 'sdk/e2e/testdata/satoshinet-rpctest-hardening.patch'
      - 'pwa/components/account/**'
      - 'pwa/entrypoints/popup/pages/RestoreAccount.vue'
      - 'pwa/entrypoints/popup/pages/Index.vue'
      - 'pwa/entrypoints/popup/pages/wallet/Setting.vue'
      - 'pwa/entrypoints/popup/pages/wallet/settings/account-management/**'
      - 'pwa/router/index.ts'
      - 'pwa/utils/accountManagement.ts'
      - 'pwa/lib/account-management-state.ts'
      - 'pwa/lib/secure-account-storage.ts'
      - 'pwa/docs/account-management.md'
      - 'pwa/package.json'
      - 'pwa/package-lock.json'
      - 'docs/account-management.md'
      - 'docs/account-secure-storage.md'
      - '.github/workflows/account-management.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: account-management-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-account:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout wallet
        uses: actions/checkout@v4
        with:
          path: sat20wallet
          fetch-depth: 0
      - name: Checkout indexer
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/indexer
          path: indexer
      - name: Checkout RGB11 engine
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/rgb11
          path: rgb11
      - name: Checkout SatoshiNet
        uses: actions/checkout@v4
        with:
          repository: sat20-labs/satoshinet
          ref: feat/dkvs-paid-retention-p0
          path: satoshinet
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sat20wallet/sdk/go.mod
          cache: false
      - name: Check Go formatting
        working-directory: sat20wallet
        shell: bash
        run: |
          files=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- \
            'sdk/account/**/*.go' 'sdk/account/*.go' 'sdk/wallet/account_*.go' \
            'sdk/wallet/dkvs_config*.go' 'sdk/wallet/dkvs_free_local*.go' \
            'sdk/wallet/dkvs_signing.go' 'sdk/wallet/dkvs_paid_retention_test.go' \
            'sdk/wallet/rgb11_dkvs.go' 'sdk/wallet/rgb11/backup_codec.go' \
            'sdk/wallet/rgb11/paid_retention_policy_test.go' 'sdk/wasm/account_management.go' \
            'sdk/e2e/account_management_dkvs_e2e_test.go' 'sdk/e2e/dkvs_noplugin_harness_test.go' \
            'sdk/e2e/dkvs_template_invoke_test.go')
          if [[ -n "$files" ]]; then
            unformatted=$(gofmt -l $files)
            if [[ -n "$unformatted" ]]; then
              printf 'Unformatted files:\n%s\n' "$unformatted"
              exit 1
            fi
          fi
      - name: Test account packages
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go test ./account/... -count=1 2>&1 | tee /tmp/account-tests.log
      - name: Vet wallet packages
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go vet -copylocks=false ./wallet/... 2>&1 | tee /tmp/wallet-vet.log
      - name: Compile wallet integration
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go test ./wallet -run '^$' -count=1 2>&1 | tee /tmp/wallet-compile.log
      - name: Test wallet packages
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go test ./wallet/... -count=1 2>&1 | tee /tmp/wallet-tests.log
      - name: Compile account E2E
        working-directory: sat20wallet/sdk
        shell: bash
        run: |
          set -o pipefail
          go test ./e2e -run '^$' -count=1 2>&1 | tee /tmp/e2e-compile.log
      - name: Build account-enabled WASM
        working-directory: sat20wallet/sdk
        env:
          GOOS: js
          GOARCH: wasm
        shell: bash
        run: |
          set -o pipefail
          go build -o /tmp/sat20wallet.wasm ./wasm 2>&1 | tee /tmp/wasm-build.log
      - name: Upload Go diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: account-management-diagnostics-${{ github.run_id }}
          path: |
            /tmp/account-tests.log
            /tmp/wallet-vet.log
            /tmp/wallet-compile.log
            /tmp/wallet-tests.log
            /tmp/e2e-compile.log
            /tmp/wasm-build.log
          if-no-files-found: ignore
          retention-days: 1

  pwa-account-management:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install PWA dependencies
        working-directory: pwa
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Type-check PWA
        working-directory: pwa
        run: npm run compile
